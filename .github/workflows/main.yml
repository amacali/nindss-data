name: NINDSS Data
on:
  # push:
  #   branches:
  #     - main
  schedule:
    # Times are UTC (GitHub cron has no DST). Anchored to AEST (UTC+10):
    # 08:00 and 16:00 AEST. During AEDT (summer) both shift ~1h later.
    # The 16:00 run is a self-healing backup — if the morning run already
    # committed today's data it regenerates an identical file and no-ops.
    - cron: '30 22 * * *'   # 08:00 AEST (previous UTC day)
    - cron: '30 6 * * *'    # 16:00 AEST
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily = year totals; month = monthly history'
        type: choice
        options:
          - daily
          - month
        default: daily

jobs:
  archive:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 1
        ref: main
    - uses: actions/setup-node@v3
      with:
        node-version: 18    
    - name: Install dependencies
      run: npm install
    - name: Run script
      # Scheduled runs pass no input → daily year totals. Manual runs may pass
      # "month" to (re)generate the monthly-history file instead.
      run: node index.js ${{ github.event.inputs.mode == 'month' && 'month' || '' }}
      timeout-minutes: 10
    - name: Push data
      run: |
        git config user.name amacali
        git config user.email anthony@macali.com.au
        git add . || exit 0
        git commit -m "auto(): update feeds" || exit 0
        git push || exit 0
