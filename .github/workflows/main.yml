name: NINDSS Data
on:
  # push:
  #   branches:
  #     - main
  schedule:
    # Times are UTC (GitHub cron has no DST). Anchored to AEDT (UTC+11):
    # 08:00 and 16:00 AEDT. During AEST (winter) both shift ~1h earlier.
    # The 16:00 run is a self-healing backup — if the morning run already
    # committed today's data it regenerates an identical file and no-ops.
    - cron: '30 21 * * *'   # 08:00 AEDT (previous UTC day)
    - cron: '30 5 * * *'    # 16:00 AEDT
  workflow_dispatch:
    inputs:
      mode:
        description: 'all-time = all-time totals (daily); year = per-year; month = monthly history'
        type: choice
        options:
          - all-time
          - year
          - month
        default: all-time

jobs:
  archive:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    # @v5 actions declare `using: node24` — v3/v4 declared node20, which triggers
    # the "Node.js 20 is deprecated … forced to run on Node.js 24" runner warning
    # (Node 20 EOL Apr 2026; runners default to Node 24 on 16 Jun 2026).
    - uses: actions/checkout@v5
      with:
        fetch-depth: 1
        ref: main
    - uses: actions/setup-node@v5
      with:
        # Node 20+ required: undici (via cheerio) references the `File` global,
        # which does not exist on Node 18 ("ReferenceError: File is not defined").
        node-version: 22
    - name: Install dependencies
      # --loglevel=error silences npm's harmless transitive-dep deprecation
      # warnings (whatwg-encoding, node-domexception — pulled in under cheerio);
      # real errors still surface.
      run: npm install --loglevel=error
    - name: Run script
      # Scheduled runs pass no input → daily all-time totals. Manual runs may pass
      # "year" or "month" to (re)generate those files instead.
      run: node index.js ${{ github.event.inputs.mode || 'all-time' }}
      timeout-minutes: 10
    - name: Push data
      run: |
        git config user.name amacali
        git config user.email anthony@macali.com.au
        git add . || exit 0
        git commit -m "auto(): update feeds" || exit 0
        git push || exit 0
