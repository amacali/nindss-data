name: NINDSS Data
on:
  # push:
  #   branches:
  #     - main
  schedule:
    # Times are UTC (GitHub cron has no DST). Anchored to AEDT (UTC+11):
    # 08:00 and 16:00 AEDT. During AEST (winter) both shift ~1h earlier.
    # The 16:00 run is a self-healing backup — if the morning run already
    # committed today's data it regenerates an identical file and no-ops.
    - cron: '30 21 * * *'   # 08:00 AEDT (previous UTC day)
    - cron: '30 5 * * *'    # 16:00 AEDT
  workflow_dispatch:
    inputs:
      mode:
        description: 'total = all-time totals (daily); year = per-year; month = monthly history'
        type: choice
        options:
          - total
          - year
          - month
        default: total

jobs:
  archive:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        ref: main
    - uses: actions/setup-node@v4
      with:
        # Node 20+ required: undici (via cheerio) references the `File` global,
        # which does not exist on Node 18 ("ReferenceError: File is not defined").
        node-version: 22
    - name: Install dependencies
      run: npm install
    - name: Run script
      # Scheduled runs pass no input → daily all-time totals. Manual runs may pass
      # "year" or "month" to (re)generate those files instead.
      run: node index.js ${{ github.event.inputs.mode || 'total' }}
      timeout-minutes: 10
    - name: Push data
      run: |
        git config user.name amacali
        git config user.email anthony@macali.com.au
        git add . || exit 0
        git commit -m "auto(): update feeds" || exit 0
        git push || exit 0
